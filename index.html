<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI POWERED UNIVERSAL CALCULATOR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <!-- Mini-COI Fix -->
    <script src="mini-coi.js" scope="./"></script>

    <py-config>
        [[fetch]]
        files = [
            "./Calculator_main.py",
            "./Grocery_calc.py",
            "./Interest_calc.py",
            "./Physics_calc.py",
            "./Simple_calculator.py",
            "./Multiplication_table.py"
        ]
    </py-config>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --terminal-bg: #1e1e1e;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .terminal-wrapper {
            width: 95vw;
            height: 95vh;
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Hidden by default */
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .terminal-wrapper.visible {
            display: flex;
        }

        .terminal-header {
            height: 40px;
            background: #252526;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #969696;
            border-bottom: 1px solid #333;
            user-select: none;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left span {
            cursor: pointer;
            padding-bottom: 8px;
        }
        
        .header-left span.active {
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
        }

        #start-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        #start-btn:hover {
            background-color: #005f9e;
        }

        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        py-terminal {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: calc(10px + 1.5vmin); 
            line-height: 1.4;
            overflow-y: auto;
            color: #cccccc;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        /* MOBILE OPTIMIZATIONS */
        @media screen and (max-width: 768px) {
            .terminal-header {
                height: 35px;
                font-size: 0.7rem;
            }

            #start-btn {
                padding: 5px 10px;
                font-size: 0.7rem;
            }

            @media screen and (orientation: portrait) {
                .terminal-wrapper.visible {
                    width: 90vw;
                    height: 50vh;
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    border-radius: 12px;
                    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
                    border: 1px solid #444;
                }

                py-terminal {
                    font-size: calc(9px + 1.2vmin); 
                    padding: 0.5rem;
                }
            }

            @media screen and (orientation: landscape) {
                .terminal-wrapper.visible {
                    width: 95vw;
                    height: 85vh;
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                }
                
                py-terminal {
                    font-size: calc(11px + 0.8vmin);
                }
            }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div>AI LOADING...</div>
        <div style="font-size: 0.8em; margin-top:5px; color:#555;">Initializing Engine</div>
    </div>

    <!-- Terminal Container -->
    <div class="terminal-wrapper" id="terminal-container">
        <div class="terminal-header">
            <div class="header-left">
                <span class="active">Terminal</span>
                <span style="color: #666;">JATH.AI</span>
            </div>
            <button id="start-btn" disabled>Wait...</button>
        </div>
        
        <script type="py" src="./Calculator_main.py" terminal worker></script>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const startBtn = document.getElementById('start-btn');
        const terminal = document.getElementById('terminal-container');
        let isReady = false;

        // Method 1: Try py-ready event
        document.addEventListener("py-ready", () => {
            console.log("py-ready event fired");
            enableInterface();
        });

        // Method 2: Intercept Console Log (More Reliable for Workers)
        // PyScript logs "PyScript page fully initialized" when done
        const originalConsoleLog = console.log;
        console.log = function(message) {
            originalConsoleLog.apply(console, arguments);
            if (message && message.toString().includes("PyScript page fully initialized")) {
                console.log("PyScript initialization detected via console log");
                enableInterface();
            }
        };

        function enableInterface() {
            if (isReady) return; // Prevent double firing
            isReady = true;

            // Fade out loader
            loader.style.opacity = '0';
            
            // Enable start button
            startBtn.disabled = false;
            startBtn.textContent = "Start Execution";
            
            // Remove loader from DOM after fade
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }

        // Start Button Click Handler
        startBtn.addEventListener('click', function() {
            terminal.classList.add('visible');
            this.style.display = 'none'; // Hide button after start
        });
    </script>
</body>
</html>
