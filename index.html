<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI POWERED UNIVERSAL CALCULATOR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <!-- Mini-COI Fix -->
    <script src="mini-coi.js" scope="./"></script>

    <py-config>
        [[fetch]]
        files = [
            "./Calculator_main.py",
            "./Grocery_calc.py",
            "./Interest_calc.py",
            "./Physics_calc.py",
            "./Simple_calculator.py",
            "./Multiplication_table.py"
        ]
    </py-config>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --terminal-bg: #1e1e1e;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 
           PORTRAIT MODE WARNING 
           Only shows the overlay. Does NOT hide the terminal wrapper 
           to prevent rendering glitches on rotation.
        */
        @media screen and (orientation: portrait) {
            body::before {
                content: "Please rotate your device to landscape mode.";
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0, 0, 0, 0.95);
                color: #fff;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                font-family: 'Inter', sans-serif;
                font-size: 18px;
                text-align: center;
                padding: 20px;
                backdrop-filter: blur(5px);
            }
            /* Dim the terminal behind the message */
            .terminal-wrapper {
                filter: blur(4px);
                pointer-events: none;
            }
        }

        /* LANDSCAPE MODE OPTIMIZATION */
        @media screen and (orientation: landscape) {
            body::before {
                display: none; /* Hide warning */
            }
            
            .terminal-wrapper {
                width: 100vw;  /* Full width */
                height: 100vh; /* Full height */
                border-radius: 0; /* Remove rounded corners for full immersion */
                border: none;
            }

            py-terminal {
                font-size: 16px; /* Slightly larger text for mobile readability */
            }
        }

        /* Default Desktop/Tablet Style */
        .terminal-wrapper {
            width: 95vw;
            height: 95vh;
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .terminal-header {
            height: 35px;
            background: #252526;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #969696;
            border-bottom: 1px solid #333;
            user-select: none;
        }

        .terminal-header span {
            margin-right: 1.5rem;
            cursor: pointer;
            padding-bottom: 8px;
        }
        
        .terminal-header span.active {
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
        }

        py-terminal {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
            color: #cccccc;
            background: transparent;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="terminal-wrapper">
        <div class="terminal-header">
            <span class="active">Terminal</span>
            <span style="margin-left: auto; color: #666;">JATH.AI</span>
        </div>
        
        <div id="loader">AI LOADING......</div>
        
        <script type="py" src="./Calculator_main.py" terminal worker></script>
    </div>

</body>
</html>
