<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI POWERED UNIVERSAL CALCULATOR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <!-- Mini-COI Fix -->
    <script src="mini-coi.js" scope="./"></script>

    <py-config>
        [[fetch]]
        files = [
            "./Calculator_main.py",
            "./Grocery_calc.py",
            "./Interest_calc.py",
            "./Physics_calc.py",
            "./Simple_calculator.py",
            "./Multiplication_table.py"
        ]
    </py-config>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --terminal-bg: #1e1e1e;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 
           RESPONSIVE TERMINAL CONTAINER 
           Defaults to desktop, overridden by mobile queries below 
        */
        .terminal-wrapper {
            width: 95vw;
            height: 95vh;
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .terminal-header {
            height: 35px;
            background: #252526;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #969696;
            border-bottom: 1px solid #333;
            user-select: none;
            flex-shrink: 0; /* Prevent header from shrinking */
        }

        .terminal-header span {
            margin-right: 1.5rem;
            cursor: pointer;
            padding-bottom: 8px;
        }
        
        .terminal-header span.active {
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
        }

        /* 
           DYNAMIC FONT SIZING 
           Uses 'vmin' to scale font based on the smallest screen dimension.
           This ensures text is readable in landscape but shrinks safely in portrait.
        */
        py-terminal {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            /* Base size 14px, scales up/down with screen size */
            font-size: calc(12px + 0.8vmin); 
            line-height: 1.4;
            overflow-y: auto;
            color: #cccccc;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            pointer-events: none;
            z-index: 10;
        }

        /* 
           MOBILE OPTIMIZATIONS (Both Portrait & Landscape) 
           Targets devices with max-width of 768px (typical tablets/phones)
        */
        @media screen and (max-width: 768px) {
            .terminal-wrapper {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
                box-shadow: none;
            }

            /* Reduce header height slightly on mobile */
            .terminal-header {
                height: 30px;
                font-size: 0.7rem;
            }

            /* 
               PORTRAIT SPECIFIC TWEAKS 
               Further reduces padding to maximize vertical space for code output 
            */
            @media screen and (orientation: portrait) {
                py-terminal {
                    padding: 0.5rem; /* Minimal padding */
                    /* Font scales down more aggressively in portrait */
                    font-size: calc(10px + 1.2vmin); 
                }
            }

            /* 
               LANDSCAPE SPECIFIC TWEAKS 
               Comfortable padding and slightly larger font 
            */
            @media screen and (orientation: landscape) {
                py-terminal {
                    padding: 1rem;
                    font-size: calc(12px + 0.8vmin);
                }
            }
        }
    </style>
</head>
<body>

    <div class="terminal-wrapper">
        <div class="terminal-header">
            <span class="active">Terminal</span>
            <span style="margin-left: auto; color: #666;">JATH.AI</span>
        </div>
        
        <div id="loader">AI LOADING......</div>
        
        <script type="py" src="./Calculator_main.py" terminal worker></script>
    </div>

</body>
</html>
